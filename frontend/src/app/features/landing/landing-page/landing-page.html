<div

>

    class="absolute top-[10%] left-[10%] w-64 h-64 bg-white/40 rounded-full mix-blend-overlay filter blur-3xl animate-pulse"
  ></div>
  <div
    class="absolute top-[20%] right-[15%] w-80 h-80 bg-white/50 rounded-full mix-blend-overlay filter blur-3xl animate-pulse"
  ></div>
  <div
    class="absolute bottom-[10%] left-[20%] w-72 h-72 bg-white/60 rounded-full mix-blend-overlay filter blur-3xl animate-pulse"
  ></div>

  <div class="absolute top-[15%] right-[30%] w-8 h-8 bg-yellow-400 rounded-sm animate-bounce"></div>

  <div class="absolute bottom-[30%] left-[10%] w-5 h-5 bg-purple-500 rounded-sm animate-bounce"></div>

  <div class="z-10 flex flex-col items-center w-full px-4 relative">
    <div class="text-center group cursor-default relative">
      <div
        class="relative z-10 w-full max-w-[350px] sm:max-w-none sm:w-[500px] md:w-[650px] lg:w-[800px] mx-auto transform transition-transform group-hover:scale-105 duration-300 drop-shadow-[0_15px_15px_rgba(0,0,0,0.3)] -mb-8 sm:-mb-12 md:-mb-16 lg:-mb-24"

        <svg viewBox="0 0 800 350" class="w-full h-full overflow-visible">
          <path id="curve" d="M 50 300 Q 400 -50 750 300" fill="transparent" />
          <defs>
            <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff0000" />
              <stop offset="16%" stop-color="#ff7f00" />
              <stop offset="33%" stop-color="#ffff00" />
              <stop offset="50%" stop-color="#00ff00" />
              <stop offset="66%" stop-color="#0000ff" />
              <stop offset="83%" stop-color="#4b0082" />
              <stop offset="100%" stop-color="#9400d3" />
            </linearGradient>
          </defs>
          <text
            class="font-extrabold uppercase tracking-widest fill-[url(#rainbowGradient)]"
            style="font-family: 'Baloo 2', sans-serif; font-size: 95px; stroke-width: 8px; stroke: white; stroke-linejoin: round; paint-order: stroke fill;"
          >
            <textPath href="#curve" startOffset="50%" text-anchor="middle">
              Pixel Together
            </textPath>
          </text>
        </svg>
      </div>
    </div>

    <div class="w-full mt-5 flex justify-center">
      <app-login-form />
    </div>
