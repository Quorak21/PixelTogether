<div
  class="bg-white/80 backdrop-blur-xl p-5 sm:p-6 rounded-[1.5rem] shadow-[0_8px_32px_rgba(0,0,0,0.1)] w-[90%] max-w-sm border border-white/50"
>
  <h2 class="text-xl sm:text-2xl font-bold mb-4 text-center text-gray-800">
    {{ isRegistering() ? 'Inscription' : 'Connexion' }}
  </h2>

  <form [formGroup]="form" (ngSubmit)="handleSubmit()" class="space-y-3">
    <div>
      <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Pseudo</label>
      <input
        type="text"
        formControlName="pseudo"
        class="w-full px-3 py-2 sm:px-4 sm:py-2.5 text-sm rounded-xl bg-gray-100/50 backdrop-blur-sm border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder-gray-400 shadow-sm"
        placeholder="Ton pseudo..."
        required
      />
    </div>

    <div>
      <label class="block text-xs sm:text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
      <input
        type="password"
        formControlName="password"
        class="w-full px-3 py-2 sm:px-4 sm:py-2.5 text-sm rounded-xl bg-gray-100/50 backdrop-blur-sm border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-400 outline-none transition-all placeholder-gray-400 shadow-sm"
        placeholder="Mot de passe..."
        required
      />
    </div>

    <button
      type="submit"
      [disabled]="form.invalid || isSubmitting()"
      class="w-full bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 text-white font-bold py-2.5 text-sm sm:text-base rounded-xl shadow-md transform transition hover:-translate-y-1 mt-2 disabled:opacity-60 disabled:cursor-not-allowed"
    >
      {{ isRegistering() ? "S'inscrire" : 'Se connecter' }}
    </button>
  </form>

  <div class="mt-4 text-center text-sm text-gray-500">
    @if (isRegistering()) {
      Deja un compte ?
      <button type="button" (click)="toggleRegister()" class="text-blue-600 hover:underline">
        Se connecter
      </button>
    } @else {
      Pas encore de compte ?
      <button type="button" (click)="toggleRegister()" class="text-blue-600 hover:underline">
        S'inscrire
      </button>
    }
  </div>

  @if (error()) {
    <p class="text-red-500 text-center mt-4">{{ error() }}</p>
  }
  @if (success()) {
    <p class="text-green-500 text-center mt-4">{{ success() }}</p>
  }
</div>
