@if (ui.joinRoomOpen()) {
  <div class="fixed inset-0 z-50 flex justify-center items-center bg-black/50 backdrop-blur-sm p-4">
    <div class="bg-base-100 p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-sm relative border border-base-300">
      <button
        type="button"
        (click)="close()"
        class="inline-flex items-center justify-center font-medium transition-colors disabled:opacity-50 disabled:pointer-events-none bg-transparent hover:bg-base-200 rounded-full aspect-square p-0 min-h-8 h-8 w-8 text-sm absolute right-3 top-3 text-base-content/60 hover:text-base-content"
        aria-label="Fermer"
      >
        ✕
      </button>

      <h2 class="text-xl font-bold text-base-content mb-6 pr-8">Rejoindre une partie</h2>

      <form [formGroup]="form" (ngSubmit)="joinRoom()" class="space-y-5" autocomplete="off">
        <div class="flex flex-col gap-1 w-full">
          <label class="pb-1" for="room-code">
            <span class="font-semibold text-base-content/80">Code de la partie</span>
          </label>
          <input
            id="room-code"
            type="text"
            autofocus
            formControlName="code"
            placeholder="ABC123"
            maxlength="6"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
            class="w-full rounded-field border border-base-300 bg-base-200/50 px-3 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary font-mono tracking-widest uppercase"
            required
          />
        </div>

        <button type="submit" [disabled]="form.invalid" class="inline-flex items-center justify-center gap-2 font-medium transition-colors disabled:opacity-50 disabled:pointer-events-none bg-primary text-primary-content hover:bg-primary/90 rounded-field min-h-10 px-4 w-full">
          Rejoindre
        </button>

        @if (error()) {
          <p class="text-sm text-center text-error">{{ error() }}</p>
        }
      </form>
    </div>
  </div>
}
