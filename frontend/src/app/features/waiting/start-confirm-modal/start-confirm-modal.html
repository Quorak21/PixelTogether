@if (open()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
    <div class="w-full max-w-md rounded-2xl border border-white/10 bg-slate-900/95 p-6 shadow-2xl backdrop-blur-xl">
      <h2 class="mb-2 text-xl font-bold text-white">{{ title() }}</h2>
      <p class="text-landing-muted">{{ hint() }}</p>

      @if (error()) {
        <p class="mt-3 text-sm text-red-400">{{ error() }}</p>
      }

      <div class="mt-6 flex justify-end gap-2">
        <button
          type="button"
          class="inline-flex items-center justify-center gap-2 rounded-xl border border-white/10 px-4 py-2 font-medium text-landing-muted transition-colors hover:bg-white/5 hover:text-white disabled:opacity-50"
          (click)="close()"
          [disabled]="isSubmitting()"
        >
          Annuler
        </button>
        <button
          type="button"
          class="inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-brand-violet to-[#5558E8] px-4 py-2 font-semibold text-white transition-all hover:scale-[1.02] disabled:opacity-50"
          (click)="confirm()"
          [disabled]="isSubmitting()"
        >
          @if (isSubmitting()) {
            <span class="inline-block size-4 animate-spin rounded-full border-2 border-current border-t-transparent"></span>
          } @else {
            Confirmer
          }
        </button>
      </div>
    </div>
  </div>
}
