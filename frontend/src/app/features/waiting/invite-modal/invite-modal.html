@if (open()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
    <div class="bg-base-100 rounded-box shadow-2xl w-full max-w-lg border border-base-300 p-6">
      <h2 class="text-xl font-bold mb-2">Inviter des joueurs</h2>
      <p class="text-sm text-base-content/70 mb-4">
        Affiche le code en stream ou partage le lien pour rejoindre la salle d'attente.
      </p>

      <div class="flex flex-col items-center gap-2 py-4 px-3 rounded-2xl bg-base-200 border border-base-300 mb-6">
        <span class="text-xs font-medium uppercase tracking-widest text-base-content/60">Code de la partie</span>
        <p class="text-4xl md:text-5xl font-bold font-mono tracking-[0.35em] text-primary select-all">
          {{ roomCode() }}
        </p>
        <button type="button" class="inline-flex items-center justify-center gap-2 font-medium transition-colors disabled:opacity-50 disabled:pointer-events-none bg-transparent hover:bg-base-200 rounded-field min-h-6 px-2 text-xs mt-1" (click)="copyCode()">
          @if (copiedCode()) {
            Code copié !
          } @else {
            Copier le code
          }
        </button>
      </div>

      <p class="text-sm text-base-content/70 mb-2">Lien direct</p>
      <div class="flex gap-2">
        <input
          type="text"
          class="w-full rounded-field border border-base-300 bg-base-100 px-3 py-2 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary flex-1 font-mono text-sm"
          [value]="roomUrl()"
          readonly
        />
        <button type="button" class="inline-flex items-center justify-center gap-2 font-medium transition-colors disabled:opacity-50 disabled:pointer-events-none bg-primary text-primary-content hover:bg-primary/90 rounded-field min-h-10 px-4 shrink-0" (click)="copyUrl()">
          @if (copiedUrl()) {
            Copié !
          } @else {
            Copier
          }
        </button>
      </div>

      <div class="flex justify-end gap-2 mt-6">
        <button type="button" class="inline-flex items-center justify-center gap-2 font-medium transition-colors disabled:opacity-50 disabled:pointer-events-none bg-transparent hover:bg-base-200 rounded-field min-h-10 px-4" (click)="close()">Fermer</button>
      </div>
    </div>
  </div>
}
