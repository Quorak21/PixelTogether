@if (open()) {
  <dialog class="modal modal-open">
    <div class="modal-box max-w-md">
      <h2 class="text-xl font-bold mb-2">Démarrer la partie ?</h2>
      <p class="text-base-content/80">
        Les joueurs ne pourront plus rejoindre une fois la partie débutée.
      </p>

      @if (error()) {
        <p class="text-error text-sm mt-3">{{ error() }}</p>
      }

      <div class="modal-action">
        <button type="button" class="btn btn-ghost" (click)="close()" [disabled]="isSubmitting()">
          Annuler
        </button>
        <button type="button" class="btn btn-success" (click)="confirm()" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <span class="loading loading-spinner loading-sm"></span>
          } @else {
            Confirmer
          }
        </button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop">
      <button type="button" (click)="close()">close</button>
    </form>
  </dialog>
}
