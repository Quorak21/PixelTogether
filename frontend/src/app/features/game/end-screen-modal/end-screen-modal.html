<div class="fixed inset-0 z-[9999] bg-slate-900/80 backdrop-blur-sm transition-opacity duration-300 overflow-y-auto w-full h-full">
  <div class="min-h-[100dvh] flex items-center justify-center p-2 sm:p-4">
    <div
      class="relative z-10 flex flex-col items-center justify-center w-full max-w-lg p-5 sm:p-8 bg-white/10 border border-white/20 shadow-[0_0_50px_rgba(255,255,255,0.1)] rounded-3xl backdrop-blur-xl my-4 sm:my-8"
    >
      <button
        type="button"
        (click)="cancel.emit()"
        class="absolute top-3 right-3 sm:top-4 sm:right-4 text-white/70 hover:text-white bg-black/40 hover:bg-black/60 rounded-full p-2 transition-all z-20"
      >
        ✕
      </button>

      <div class="text-center mb-4 sm:mb-6 mt-2 sm:mt-4">
        <h2
          class="text-3xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-yellow-400 via-orange-500 to-red-500 tracking-wider uppercase"
        >
          Incroyable!
        </h2>
        <p class="mt-1 sm:mt-2 text-base sm:text-xl text-white font-semibold">Ton chef-d'oeuvre est termine.</p>
      </div>

      <div class="relative mb-5 sm:mb-8 flex items-center justify-center w-48 h-48 sm:w-64 sm:h-64">
        <div
          class="absolute w-full h-full opacity-100 blur-xl rounded-full scale-[1.15] sm:scale-125"
          style="background: conic-gradient(from 0deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff, #ff0000);"
        ></div>

        <div class="relative z-10 p-2 sm:p-3 bg-white rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.6)] border-4 border-white">
          @if (image()) {
            <img [src]="image()" alt="Ton chef-d'oeuvre" class="w-36 h-36 sm:w-48 sm:h-48 object-contain rounded-md bg-white block" />
          } @else {
            <div class="w-36 h-36 sm:w-48 sm:h-48 bg-gradient-to-br from-gray-200 to-gray-400 rounded-md flex items-center justify-center">
              <span class="text-gray-500 font-bold">Image</span>
            </div>
          }
        </div>
      </div>

      <p class="text-center text-white text-base sm:text-lg font-bold mb-4 sm:mb-6 max-w-xs sm:max-w-md">
        Veux-tu partager ton art dans la galerie publique, ou la garder pour toi ?
      </p>

      <div class="flex flex-col w-full gap-3 sm:gap-4 px-2 sm:px-0">
        <button
          type="button"
          (click)="confirm.emit(true)"
          class="flex-1 flex items-center justify-center gap-2 sm:gap-3 py-3 sm:py-4 px-4 sm:px-6 rounded-2xl bg-gradient-to-b from-green-400 to-green-500 text-white font-extrabold text-lg sm:text-xl"
        >
          🌍 Publier dans la galerie !
        </button>

        <button
          type="button"
          (click)="confirm.emit(false)"
          class="flex-1 flex items-center justify-center gap-2 sm:gap-3 py-2.5 sm:py-3 px-4 sm:px-6 rounded-2xl bg-gradient-to-b from-slate-500 to-slate-600 text-white font-bold text-base sm:text-lg"
        >
          🔒 Garder privee
        </button>
      </div>
    </div>
  </div>
</div>
