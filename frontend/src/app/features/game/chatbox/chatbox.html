<div class="flex flex-col h-full min-h-0 bg-base-100">
  <div class="flex items-center gap-2 shrink-0 p-3 bg-neutral text-neutral-content select-none">
    <span>💬</span>
    <span class="font-bold text-sm tracking-wide">Chat</span>
  </div>

  <div class="flex-1 min-h-0 overflow-y-auto p-4 bg-base-200/30">
    @if (chatMessages().length === 0) {
      <div class="flex flex-col items-center justify-center h-full text-sm italic text-base-content/40">
        <span class="text-3xl mb-3 opacity-20">💬</span>
        <p>Aucun message pour le moment.</p>
      </div>
    } @else {
      @for (msg of chatMessages(); track $index) {
        <div class="flex items-start gap-1 text-sm min-w-0">
          @if (isHostMessage(msg)) {
            <span class="flex items-center gap-1 font-bold text-red-500 mr-2 shrink-0">👑 {{ msg.pseudo }}:</span>
          } @else {
            <span class="font-bold text-secondary mr-2 shrink-0">{{ msg.pseudo }}:</span>
          }
          <span class="text-base-content/90 break-all min-w-0">{{ msg.message }}</span>
        </div>
      }
    }
    <div #messagesEnd></div>
  </div>

  <div class="shrink-0 p-3 border-t border-base-200 bg-base-100">
    <form (ngSubmit)="sendMessage()" class="relative flex gap-2 items-center" autocomplete="off">
      <input
        type="text"
        [(ngModel)]="inputValue"
        name="chatInput"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        class="input input-sm input-bordered flex-1 rounded-full pl-4 pr-10 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-inner bg-base-200/50"
        placeholder="Écrire un message..."
        maxlength="200"
      />
      <button
        type="submit"
        class="btn btn-sm btn-primary btn-circle absolute right-0.5 shadow-md flex items-right justify-center min-h-[1.75rem] h-7 w-7"
        [disabled]="!inputValue.trim()"
      >
        ➤
      </button>
    </form>
  </div>
</div>
