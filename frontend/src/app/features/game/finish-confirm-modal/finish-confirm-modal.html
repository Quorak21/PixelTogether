<div class="fixed inset-0 z-50 flex justify-center items-center bg-black/50 backdrop-blur-sm">
  <div class="bg-white p-6 rounded-lg shadow-lg w-80 text-center relative animate-fade-in-up">
    <h2 class="text-lg font-semibold text-gray-800 mb-2">{{ title() }}</h2>
    <p class="text-gray-600 mb-6 text-sm">{{ message() }}</p>

    <div class="flex justify-center gap-4">
      <button
        type="button"
        (click)="cancel.emit()"
        class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-md transition-colors font-medium"
      >
        Annuler
      </button>
      <button
        type="button"
        (click)="confirm.emit()"
        [class]="'px-4 py-2 ' + buttonColor() + ' text-white rounded-md transition-colors font-medium shadow-sm'"
      >
        {{ buttonText() }}
      </button>
    </div>
  </div>
</div>
