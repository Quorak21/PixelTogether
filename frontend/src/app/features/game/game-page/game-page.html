<div class="flex flex-col h-full min-h-0 relative">
  @if (transitionActive() && ui.groupTransition()) {
    <app-group-transition-modal (dismissed)="onTransitionDismissed()" />
  }

  <div
    class="flex flex-col flex-1 min-h-0"
    [class.pointer-events-none]="transitionActive() && ui.groupTransition()"
    [class.blur-sm]="transitionActive() && ui.groupTransition()"
  >
    @if (ui.isManager()) {
      <div class="shrink-0 flex items-center justify-between px-4 py-2 border-b border-base-200 bg-base-100">
        <span class="text-sm font-semibold text-base-content/80">
          Mode spectateur — {{ ui.groupLabel() || 'Groupe' }}
        </span>
        <button type="button" class="btn btn-sm btn-outline btn-primary" (click)="returnToLobby()">
          Retour au lobby
        </button>
      </div>
    }

    <div class="flex flex-1 min-h-0">
      <div class="relative flex-1 min-w-0 overflow-hidden bg-slate-200">
        <app-canvas-board [eventId]="eventId()" [groupCode]="groupCode()" />
      </div>

      <aside class="shrink-0 w-80 min-h-0 border-l border-base-200 bg-base-100">
        <app-chatbox [eventId]="eventId()" [groupCode]="groupCode()" />
      </aside>
    </div>

    @if (!ui.isManager()) {
      <footer class="shrink-0 border-t border-base-200 bg-base-100">
        <app-color-palette />
      </footer>
    }
  </div>
</div>
