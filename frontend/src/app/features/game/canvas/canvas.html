<div
  #viewport
  class="flex items-center justify-center w-full h-full p-3 select-none"
  (wheel)="handleWheel($event)"
  (pointerdown)="handlePointerDown($event)"
  (pointermove)="handlePointerMove($event)"
  (pointerup)="handlePointerUp($event)"
  (pointerleave)="handlePointerUp($event)"
  (contextmenu)="handleContextMenu($event)"
>
  <canvas
    #canvasEl
    id="canvas"
    (pointerup)="handleDraw($event)"
    class="shrink-0 bg-white shadow-2xl"
    [class.cursor-crosshair]="!ui.isHost()"
    [class.cursor-grab]="ui.isHost()"
    [style.transition]="isDragging() ? 'none' : 'transform 0.1s ease-in-out'"
    [style.transform]="'translate(' + position().x + 'px, ' + position().y + 'px) scale(' + scale() + ')'"
  ></canvas>
</div>
