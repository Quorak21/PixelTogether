@if (ui.gridCreationOpen()) {
  <div class="fixed inset-0 z-50 flex justify-center items-center bg-black/50 backdrop-blur-sm p-4">
    <div
      class="bg-base-100 p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-sm relative border border-base-300"
    >
      <button
        type="button"
        (click)="ui.gridCreationOpen.set(false)"
        class="btn btn-sm btn-circle btn-ghost absolute right-3 top-3 text-base-content/60 hover:text-base-content"
        aria-label="Fermer"
      >
        ✕
      </button>

      <h2 class="text-xl font-bold text-base-content mb-6 pr-8">Nouvelle partie</h2>

      <form [formGroup]="form" (ngSubmit)="createNewGrid()" class="space-y-5" autocomplete="off">
        <div class="form-control w-full">
          <label class="label pb-1" for="party-name">
            <span class="label-text font-semibold text-base-content/80">Nom de la partie</span>
          </label>
          <input
            id="party-name"
            type="text"
            formControlName="partyName"
            placeholder="Team building Q2…"
            maxlength="30"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            class="input input-bordered focus:border-primary w-full bg-base-200/50"
            required
          />
        </div>

        <div class="form-control w-full">
          <label class="label pb-1" for="grid-theme">
            <span class="label-text font-semibold text-base-content/80">Thème</span>
          </label>
          <input
            id="grid-theme"
            type="text"
            formControlName="theme"
            placeholder="Paysage, portrait, abstrait…"
            maxlength="30"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            class="input input-bordered focus:border-primary w-full bg-base-200/50"
            required
          />
        </div>

        <button
          type="submit"
          [disabled]="form.invalid || isSubmitting()"
          class="btn btn-primary w-full"
        >
          Créer la partie
        </button>

        @if (error()) {
          <p class="text-sm text-center text-error">{{ error() }}</p>
        }
      </form>
    </div>
  </div>
}
