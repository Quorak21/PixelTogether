@if (ui.galleryOpen()) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 pointer-events-none text-left">
    <div
      class="absolute inset-0 bg-base-300/60 backdrop-blur-sm pointer-events-auto transition-opacity duration-300"
      (click)="ui.galleryOpen.set(false)"
    ></div>

    <div
      class="relative w-full max-w-[80vw] h-[80vh] bg-base-100/90 backdrop-blur-xl border border-base-content/10 rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.3)] flex flex-col pointer-events-auto overflow-hidden animate-in fade-in zoom-in-95 duration-300"
    >
      <div class="flex items-center justify-between p-6 sm:px-10 border-b border-base-content/10 bg-base-200/50">
        <div>
          <h2 class="text-3xl font-bold tracking-tight text-base-content">
            {{ ui.showPersonalGallery() ? 'Galerie personnelle' : 'Galerie' }}
          </h2>
          <p class="text-sm opacity-70 mt-1 text-base-content">
            {{
              ui.showPersonalGallery()
                ? 'Gerez vos creations.'
                : 'Decouvrez les meilleures creations de la communaute.'
            }}
          </p>
        </div>
        <button
          type="button"
          (click)="ui.galleryOpen.set(false)"
          class="btn btn-circle btn-ghost bg-base-300/50 hover:bg-base-300 text-base-content no-animation"
        >
          ✕
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-6 sm:p-10 custom-scrollbar">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 space-y-6">
          @for (item of galleryData(); track item.id) {
            <app-gallery-card
              [item]="item"
              [personal]="ui.showPersonalGallery()"
              (deleteGrid)="handleDelete($event)"
              (publicToggled)="handlePublicToggle($event.gridId, $event.currentValue)"
            />
          }
        </div>
      </div>
    </div>
  </div>
}
