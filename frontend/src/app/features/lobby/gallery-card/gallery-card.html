<div
  (click)="openFullscreen()"
  class="group h-64 relative break-inside-avoid mt-0 rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-all duration-500 bg-base-100 border border-base-content/5 cursor-pointer"
>
  <div class="block h-full overflow-hidden">
    <img
      [src]="item().image"
      [alt]="item().name"
      class="w-full h-full object-contain transition-transform duration-700 group-hover:scale-105"
      loading="lazy"
    />
  </div>
  <div
    class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-5"
  >
    <div class="translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
      <h3 class="text-white font-bold text-lg leading-tight drop-shadow-md">{{ item().name }}</h3>
      @if (!personal()) {
        <div class="flex items-center mt-2 gap-2 text-white/80">
          <span>👤</span>
          <p class="text-sm font-medium drop-shadow-md first-letter:uppercase">{{ item().author }}</p>
        </div>
      }
    </div>

    <div
      class="absolute top-4 left-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-100"
    >
      @if (personal()) {
        <button
          type="button"
          (click)="handleDelete($event)"
          class="btn btn-sm btn-circle bg-red-500/50 border-white/20 text-white hover:bg-red-500 hover:text-black transition-colors backdrop-blur-md"
        >
          🗑
        </button>
      }
    </div>

    <div
      class="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-100"
    >
      <span class="text-lg font-bold text-red-500">{{ likes() ?? item().likes }}</span>
      <button
        type="button"
        (click)="handleLike($event)"
        [class]="
          personal() || (liked() ?? item().liked)
            ? 'btn btn-sm btn-circle bg-red-500/50 border-white/20 text-black disabled'
            : 'btn btn-sm btn-circle bg-black/50 border-white/20 text-white hover:bg-white hover:text-black transition-colors backdrop-blur-md'
        "
      >
        ❤
      </button>
    </div>

    @if (personal()) {
      <div
        class="absolute bottom-5 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 delay-100"
      >
        <span class="text-sm font-bold text-success">Public</span>
        <input
          type="checkbox"
          [checked]="item().onGallery"
          class="toggle z-50 border-gray-600 bg-gray-500 checked:border-green-500 checked:bg-green-400 checked:text-green-800"
          (click)="$event.stopPropagation()"
          (change)="togglePublic()"
        />
      </div>
    }
  </div>
</div>

@if (fullScreenImage(); as image) {
  <div
    class="fixed inset-0 bg-black/96 backdrop-blur-sm flex justify-center items-center z-[9999] p-4"
    (click)="fullScreenImage.set(null)"
  >
    <button
      type="button"
      class="absolute hover:bg-accent/50 top-6 right-6 text-white rounded-xl shadow-lg hover:text-accent-content transition-colors"
      (click)="fullScreenImage.set(null)"
    >
      ✕
    </button>
    <img
      [src]="image.image"
      [alt]="image.name"
      class="max-w-[85vw] max-h-[85vh] object-contain [image-rendering:pixelated] bg-white rounded-sm"
    />
  </div>
}
