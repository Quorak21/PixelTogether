<div class="navbar bg-base-100 shadow-lg z-50 relative">
  <div class="flex-1 flex items-center gap-4 min-w-0">
    <button
      type="button"
      class="btn btn-ghost text-xl text-primary font-bold uppercase shrink-0"
      (click)="handleExitToLobby()"
    >
      Pixel Together
    </button>
    @if (ui.gameMode() && ui.partyName()) {
      <span class="text-lg font-bold truncate text-base-content">{{ ui.partyName() }}</span>
    } @else if (ui.waitingMode() && ui.partyName()) {
      <span class="text-lg font-bold truncate text-base-content">{{ ui.partyName() }}</span>
    }
  </div>

  <div class="flex-none flex items-center gap-3">
    @if (ui.inRoom() && ui.currentProfile(); as profile) {
      <div class="flex items-center gap-2 min-w-0">
        <app-avatar-placeholder [color]="profile.avatarColor" size="sm" />
        <span class="font-semibold text-sm truncate max-w-36">{{ profile.pseudo }}</span>
      </div>
    }
  </div>
</div>
