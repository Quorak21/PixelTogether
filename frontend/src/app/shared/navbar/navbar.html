<div class="navbar bg-base-100 shadow-lg z-50 relative">
  <div class="flex-1">
    <button
      type="button"
      class="btn btn-ghost text-xl text-primary font-bold uppercase"
      (click)="handleExitToLobby()"
    >
      Pixel Together
    </button>
  </div>

  <div class="flex-none flex items-center gap-5">
    <div class="flex items-center gap-2">
      <span class="text-lg font-bold">{{ auth.gold() }}</span>
      <img ngSrc="assets/images/coins.png" width="28" height="28" alt="gold" class="w-7 h-7" />
    </div>

    <div class="dropdown dropdown-end">
      <button tabindex="0" class="btn btn-neutral rounded-full font-bold capitalize">
        {{ auth.currentUser()?.pseudo }}
      </button>
      <ul
        tabindex="0"
        class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-44"
      >
        @if (!ui.gameMode()) {
          <li>
            <button type="button" (click)="openPublicGallery()">Galerie publique</button>
          </li>
          <li>
            <button type="button" (click)="openPersonalGallery()">Ma galerie</button>
          </li>
        }
        <li>
          <button type="button" (click)="logout()">Deconnexion</button>
        </li>
      </ul>
    </div>
  </div>
</div>
