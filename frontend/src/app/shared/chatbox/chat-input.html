<form (ngSubmit)="sendMessage()" class="flex w-full items-center gap-2" autocomplete="off">
  <div class="relative flex-1 min-w-0">
    <input
      type="text"
      [(ngModel)]="inputValue"
      name="chatInput"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
      (input)="onInputChange()"
      (blur)="onInputBlur()"
      class="w-full rounded-xl border border-white/10 bg-slate-950/60 py-2.5 pl-4 pr-10 text-sm text-white placeholder-slate-500 focus:border-brand-violet focus:outline-none focus:ring-1 focus:ring-brand-violet/50"
      placeholder="Écrire un message..."
      maxlength="200"
      [disabled]="isOffline()"
    />
    <button
      type="submit"
      class="absolute right-1.5 top-1/2 inline-flex h-7 w-7 min-h-[1.75rem] -translate-y-1/2 items-center justify-center rounded-lg bg-brand-violet text-xs font-medium text-white shadow-md transition-colors hover:bg-brand-violet/90 disabled:pointer-events-none disabled:opacity-50"
      [disabled]="!inputValue.trim() || isOffline()"
    >
      ➤
    </button>
  </div>
</form>
