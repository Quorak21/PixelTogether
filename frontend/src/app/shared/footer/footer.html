<div class="footer footer-center justify-center bg-base-100 shadow-lg text-base-content border-t border-black-200 md:h-16 h-10">
  <div class="flex items-center gap-2">
    <button type="button" (click)="isFullscreen.set(true)">
      <img
        ngSrc="assets/images/logoDokkCorp.png"
        width="32"
        height="32"
        alt="Logo de la Dokk Corp."
        class="md:w-8 md:h-8 w-6 h-6"
      />
    </button>
    <h2 class="font-bold md:text-lg text-primary">Dokk Corp. &copy; 2026</h2>
  </div>
  <div>
    <p class="text-sm text-gray-500">Version beta 0.2.0</p>
  </div>
</div>

@if (isFullscreen()) {
  <div
    class="fixed inset-0 z-[100] bg-black/95 flex flex-col justify-center items-center cursor-pointer transition-opacity duration-300"
    (click)="isFullscreen.set(false)"
    title="Fermer"
  >
    <div class="flex flex-col items-center mb-12">
      <h1
        class="text-5xl md:text-7xl font-black text-primary drop-shadow-[0_0_30px_rgba(255,255,255,0.8)] tracking-widest uppercase animate-bounce"
      >
        L'ELITE
      </h1>
      <h2 class="text-3xl md:text-5xl font-bold text-white drop-shadow-xl mt-6 tracking-wider">
        Dokk Corp.
      </h2>
    </div>

    <img
      ngSrc="assets/images/logoDokkCorp.png"
      width="600"
      height="600"
      alt="Dokk Corp Logo Fullscreen"
      class="w-[50vw] h-[50vh] object-contain animate-pulse drop-shadow-[0_0_30px_rgba(255,255,255,0.4)] opacity-50 hover:opacity-100 transition-all duration-500 hover:scale-105"
    />
  </div>
}
