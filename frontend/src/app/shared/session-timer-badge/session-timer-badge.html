@if (sessionTimerLabel(); as timer) {
  <div
    class="flex shrink-0 flex-col items-center rounded-xl border-2 px-6 py-1.5 transition-all duration-500"
    [class]="timerColorClasses()"
  >
    <span class="text-[10px] font-bold uppercase tracking-[0.15em] opacity-70">Temps</span>
    <span class="font-mono text-xl font-black tabular-nums leading-tight">{{ timer }}</span>
  </div>
}
